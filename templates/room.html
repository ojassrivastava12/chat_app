{% extends 'bg.html' %}
{% block main %}
<div class="msg-box">
    <div class="header">
        <h2 class="m">CHAT ROOM - {{code}}</h2>
        <div class="count_user">
            <p id="count"><i>Users</i>:0</p>
        </div>
    </div>
    <div class="msg" id="msg"></div>
    <div class="inputs">
        <input type="text" name="message" id="message" placeholder="Enter Message">
        <button type="button" name="send" id="send-btn" onclick="sendMessage()">Send</button>
    </div>
    
</div>
<script type="text/javascript">
    var socketio = io();

    const messages = document.getElementById('msg');

    const createMsg = (name, msg) => {
        const content = `
        <div class="txt-msg">
            <span>
                <strong>${name}</strong>: ${msg}
            </span>    
        </div>
        `;
        messages.innerHTML += content;
    };
    socketio.on("message", (data) =>{
        createMsg(data.name, data.message);
        console.log(data)
    });
    const sendMessage = () => {
        const msg = document.getElementById('message')
        if (msg.value == "") return;
        socketio.emit("message", {data: msg.value})
        msg.value = ""
    };
    socketio.on("update_count", (data) => {
        document.getElementById("count").innerHTML = `<i>Users:</i>${data.count}`;
    });

</script>
{% endblock  %}
